
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Estates</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h2>Prime Estates</h2>
<nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Properties</a>
<ul>
<li><a href="#">Buy</a></li>
<li><a href="#">Rent</a></li>
<li><a href="#">Commercial</a></li>
</ul>
</li>
<li><a href="#">Agents</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>
</header>

<section class="hero">
<div>
<h1>Find Your Dream Home</h1>
<div class="search-box">
<input type="text" placeholder="Location">
<select><option>Type</option><option>House</option><option>Apartment</option></select>
<button onclick="search()">Search</button>
</div>
</div>
</section>

<section class="section">
<h2>Featured Properties</h2>
<div class="cards">
<div class="card">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<div class="card-body">
<h3>Luxury Villa</h3>
<p>$500,000</p>
<button onclick="viewDetails()">View Details</button>
</div>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
<div class="card-body">
<h3>Modern Apartment</h3>
<p>$250,000</p>
<button onclick="viewDetails()">View Details</button>
</div>
</div>
</div>
</section>

<section class="section">
<h2>Contact Us</h2>
<form onsubmit="submitForm(event)">
<input type="text" placeholder="Name" required><br><br>
<input type="email" placeholder="Email" required><br><br>
<textarea placeholder="Message" required></textarea><br><br>
<button type="submit">Send</button>
</form>
</section>

<footer class="footer">
<p>© 2026 Prime Estates | All Rights Reserved</p>
</footer>

<script src="script.js"></script>
</body>
</html>
